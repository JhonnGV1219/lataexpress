{% extends "./plantillaPrincipal.html" %}
{% load static %} 

{% block contenido %}

<section class="login-page" style="background-image: url('{% static 'login-form-20/login-form-20/images/login12.png' %}');">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="login-wrap p-4 p-md-5">

                    

                    <h3 class="text-center mb-4 login-title">
                        Iniciar Sesión
                    </h3>

                    <!-- Mensajes -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="close" data-dismiss="alert">
                                    <span>&times;</span>
                                </button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form action="/login/" method="POST" class="signin-form">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="username">Usuario</label>
                            <input id="username" type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
                        </div>

                        <div class="form-group position-relative">
                            <label for="password-field">Contraseña</label>
                            <input id="password-field" type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
                            <span toggle="#password-field"
                                  class="fa fa-fw fa-eye field-icon toggle-password"
                                  aria-label="Mostrar contraseña">
                            </span>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="form-control btn submit px-3">
                                Iniciar Sesión
                            </button>
                        </div>

                        <div class="form-group d-md-flex">
                            <div class="w-50 text-left">
                                <label class="checkbox-wrap checkbox-primary mb-0"
                                       style="color:white;">
                                    Recordarme
                                    <input type="checkbox" name="remember" checked>
                                    <span class="checkmark"></span>
                                </label>
                            </div>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

</section>

<style>
.login-page {
    position: relative;
    min-height: calc(100vh - 132px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 15px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

body:has(.login-page) footer {
    display: none;
}

.login-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(106, 107, 109, 0.42);
}

.login-page .container,
.login-page .row,
.login-page .col-md-6 {
    position: relative;
    z-index: 1;
}

.login-wrap {
    width: 100%;
    max-width: 410px;
    background: rgba(7, 19, 36, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 14px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    color: #fff;
}

.login-title {
    color: #fff;
    font-size: 1.7rem;
    font-weight: 700;
    text-shadow: 0 2px 12px rgba(0, 198, 255, 0.65);
}

.login-wrap label {
    display: block;
    margin-bottom: 7px;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
}

.login-wrap .form-group {
    margin-bottom: 22px;
}

.login-wrap .form-control {
    height: 48px;
    padding: 10px 44px 10px 14px;
    background: #fff !important;
    border: 2px solid #d7e1ea;
    border-radius: 8px;
    color: #172b4d !important;
    font-size: 0.95rem;
}

.login-wrap .form-control::placeholder {
    color: #728096;
    opacity: 1;
}

.login-wrap .form-control:focus {
    border-color: #00aeea;
    box-shadow: 0 0 0 3px rgba(0, 174, 234, 0.25) !important;
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 40px;
    color: #007fae;
    cursor: pointer;
}

.login-wrap .submit {
    height: 48px;
    background: linear-gradient(135deg, #00aeea, #006de5);
    border: 0;
    border-radius: 8px;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 8px 18px rgba(0, 109, 229, 0.35);
}

.login-wrap .submit:hover {
    background: linear-gradient(135deg, #0097cc, #005bc2);
}

.login-wrap .checkbox-wrap {
    color: #fff;
    font-weight: 400;
}

@media (max-width: 767px) {
    .login-page {
        min-height: calc(100vh - 104px);
        padding: 45px 15px;
    }
}
</style>

<script>
$(document).ready(function() {
    $(".toggle-password").click(function() {
        $(this).toggleClass("fa-eye fa-eye-slash");

        var input = $($(this).attr("toggle"));

        if (input.attr("type") == "password") {
            input.attr("type", "text");
        } else {
            input.attr("type", "password");
        }
    });
});
</script>

{% endblock %}
