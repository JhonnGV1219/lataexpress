{% extends "./plantillaPrincipal.html" %}
{% load static %}
{% block contenido %}

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <h2 class="fw-bold text-center mb-1">Registrar Encomienda</h2>
            <p class="text-muted text-center mb-4">Completa los datos para generar el registro de envío</p>

            <form action="/guardar_encomienda/" method="post" id="form_nueva_encomienda">
                {% csrf_token %}

                <!-- ===== CLIENTE ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <b><i class="bi bi-person-fill"></i> Cliente</b>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label"><b>Cliente</b></label>
                                <select name="cliente" class="form-select" required>
                                    <option value="">Seleccione un cliente</option>
                                    {% for c in clientes %}
                                        <option value="{{ c.id }}">
                                            {{ c.nombre }} {{ c.apellido }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ===== DESTINO ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <b><i class="bi bi-geo-alt-fill"></i> Destino</b>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label"><b>Ciudad</b></label>
                                <input type="text" name="ciudad" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Código Postal</b></label>
                                <input type="text" name="codigo_postal" class="form-control" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label"><b>Dirección</b></label>
                                <input type="text" name="direccion" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ===== DESTINATARIO ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <b><i class="bi bi-person-badge-fill"></i> Destinatario</b>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label"><b>Nombre completo</b></label>
                                <input type="text" name="nombre_destinatario" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Cédula</b></label>
                                <input type="text" name="cedula_destinatario" maxlength="10" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Email</b></label>
                                <input type="email" name="email_destinatario" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Teléfono</b></label>
                                <input type="text" name="telefono_destinatario" maxlength="15" class="form-control" required>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- ===== PAQUETE ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <b><i class="bi bi-box-seam-fill"></i> Datos del paquete</b>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label"><b>Descripción</b></label>
                                <textarea name="descripcion" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Peso (kg)</b></label>
                                <input type="number" step="0.01" name="peso" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><b>Precio ($)</b></label>
                                <input type="number" step="0.01" name="precio" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ===== LOGÍSTICA ===== -->
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <b><i class="bi bi-truck"></i> Logística</b>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label"><b>Estado</b></label>
                                <select name="estado" class="form-select">
                                    <option value="OFICINA">En oficina</option>
                                    <option value="TRANSPORTE">En transporte</option>
                                    <option value="ENTREGADO">Entregado</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label"><b>Transporte</b></label>
                                <select name="transporte" class="form-select" required>
                                    <option value="BUS">Bus</option>
                                    <option value="CAMIONETA">Camioneta</option>
                                    <option value="MOTO">Moto</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label"><b>Fecha estimada</b></label>
                                <input type="datetime-local" name="fecha_estimada" id="fecha_estimada" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- BOTONES -->
                <div class="text-center mb-4">
                    <button class="btn btn-success px-4" type="submit">
                        <i class="bi bi-save-fill"></i> Guardar Encomienda
                    </button>

                    <a href="/showencomiendas/" class="btn btn-outline-danger px-4">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
$(document).ready(function () {

    let fechaMin = new Date();
    fechaMin.setHours(fechaMin.getHours() + 5);

    let fechaMax = new Date();
    fechaMax.setHours(fechaMax.getHours() + 72);

    fechaMin.setMinutes(fechaMin.getMinutes() - fechaMin.getTimezoneOffset());
    fechaMax.setMinutes(fechaMax.getMinutes() - fechaMax.getTimezoneOffset());

    $("input[name='fecha_estimada']")
        .attr("min", fechaMin.toISOString().slice(0,16))
        .attr("max", fechaMax.toISOString().slice(0,16));

    $.validator.addMethod("soloLetras", function (value, element) {
        return this.optional(element) || /^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$/.test(value);
    }, "Solo se permiten letras.");

    $.validator.addMethod("soloNumeros", function (value, element) {
        return this.optional(element) || /^[0-9]+$/.test(value);
    }, "Solo se permiten números.");

    $.validator.addMethod("cedulaEC", function(value, element){

        if(!/^\d{10}$/.test(value)){
            return false;
        }

        let provincia = parseInt(value.substring(0,2));
        let tercerDigito = parseInt(value.charAt(2));

        if(provincia < 1 || provincia > 24 || tercerDigito >= 6){
            return false;
        }

        let suma = 0;

        for(let i = 0; i < 9; i++){

            let num = parseInt(value.charAt(i));

            if(i % 2 == 0){
                num *= 2;
                if(num > 9){
                    num -= 9;
                }
            }

            suma += num;

        }

        let decena = Math.ceil(suma / 10) * 10;
        let digitoVerificador = decena - suma;

        if(digitoVerificador == 10){
            digitoVerificador = 0;
        }

        return digitoVerificador == parseInt(value.charAt(9));

    }, "Ingrese una cédula ecuatoriana válida.");

    $.validator.addMethod("tiempoEntrega", function(value, element){

        let fechaSeleccionada = new Date(value);

        let fechaMin = new Date();
        fechaMin.setHours(fechaMin.getHours() + 5);

        let fechaMax = new Date();
        fechaMax.setHours(fechaMax.getHours() + 72);

        return fechaSeleccionada >= fechaMin && fechaSeleccionada <= fechaMax;

    }, "El tiempo estimado debe estar entre 5 y 72 horas.");

    $("#form_nueva_encomienda").validate({
        rules:{
            cliente:{
                required:true
            },

            ciudad:{
                required:true,
                minlength:3,
                maxlength:30,
                soloLetras:true
            },

            codigo_postal:{
                required:true,
                soloNumeros:true,
                minlength:4,
                maxlength:6
            },

            direccion:{
                required:true,
                minlength:5,
                maxlength:100
            },

            nombre_destinatario:{
                required:true,
                minlength:3,
                maxlength:30,
                soloLetras:true
            },

            cedula_destinatario:{
                required:true,
                soloNumeros:true,
                minlength:10,
                maxlength:10,
                cedulaEC:true
            },

            email_destinatario:{
                required:true,
                email:true
            },

            telefono_destinatario:{
                required:true,
                soloNumeros:true,
                minlength:10,
                maxlength:10
            },

            descripcion:{
                required:true,
                minlength:5,
                maxlength:200
            },

            peso:{
                required:true,
                number:true,
                min:0.01,
                max:150
            },

            precio:{
                required:true,
                number:true,
                min:0.01,
                max:1000
            },

            transporte:{
                required:true
            },

            fecha_estimada:{
                required:true,
                tiempoEntrega:true
            }
        },
        messages:{

            cliente:{
                required:"Seleccione un cliente."
            },

            ciudad:{
                required:"Ingrese la ciudad.",
                minlength:"Debe tener mínimo 3 caracteres.",
                maxlength:"No debe superar los 30 caracteres.",
                soloLetras:"Solo se permiten letras."
            },

            codigo_postal:{
                required:"Ingrese el código postal.",
                soloNumeros:"Solo se permiten números.",
                minlength:"Debe tener mínimo 4 dígitos.",
                maxlength:"No debe superar los 6 dígitos."
            },

            direccion:{
                required:"Ingrese la dirección.",
                minlength:"Debe tener mínimo 5 caracteres.",
                maxlength:"No debe superar los 100 caracteres."
            },

            nombre_destinatario:{
                required:"Ingrese el nombre del destinatario.",
                minlength:"Debe tener mínimo 3 caracteres.",
                maxlength:"No debe superar los 30 caracteres.",
                soloLetras:"Solo se permiten letras."
            },

            cedula_destinatario:{
                required:"Ingrese la cédula.",
                soloNumeros:"Solo se permiten números.",
                minlength:"La cédula debe tener 10 dígitos.",
                maxlength:"La cédula debe tener 10 dígitos.",
                cedulaEC:"La cédula ecuatoriana no es válida."
            },

            email_destinatario:{
                required:"Ingrese el correo electrónico.",
                email:"Ingrese un correo válido."
            },

            telefono_destinatario:{
                required:"Ingrese el teléfono.",
                soloNumeros:"Solo se permiten números.",
                minlength:"Debe tener 10 dígitos.",
                maxlength:"Debe tener 10 dígitos."
            },

            descripcion:{
                required:"Ingrese la descripción.",
                minlength:"Debe tener mínimo 5 caracteres.",
                maxlength:"No debe superar los 200 caracteres."
            },

            peso:{
                required:"Ingrese el peso.",
                number:"Ingrese un número válido.",
                min:"Debe ser mayor a 0.",
                max:"No puede superar los 150 kg."
            },

            precio:{
                required:"Ingrese el precio.",
                number:"Ingrese un número válido.",
                min:"Debe ser mayor a 0.",
                max:"No puede superar los 1000 dólares."
            },

            transporte:{
                required:"Seleccione el transporte."
            },

            fecha_estimada:{
                required:"Seleccione la fecha estimada.",
                tiempoEntrega:"El tiempo estimado debe estar entre 5 y 72 horas."
            }
        },

        errorClass:"text-danger",

        highlight:function(element){
            $(element).addClass("is-invalid");

        },

        unhighlight:function(element){
            $(element).removeClass("is-invalid");
            $(element).addClass("is-valid");

        }

    });
});
</script>

{% endblock %}
